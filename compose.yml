services:
  worker:
    profiles: 
      - worker
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: crawler/worker:latest
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - POSTGRES_HOST=postgres
      - PYTHONUNBUFFERED=1
    working_dir: /app
    tty: true
    stdin_open: true
    networks:
      - worker-net

  airflow:
    profiles: 
      - airflow
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: crawler/airflow:latest
    user: "root"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=uH0_V9PzH5R1nZ3sD-mG_U2Xh7vBf8P1kS4mRjL6z3Q=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - POSTGRES_HOST=postgres
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    ports:
      - "8080:8080"
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    profiles: 
      - airflow
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    profiles: 
      - worker
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - worker-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    profiles: 
      - worker
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mongodb
    networks:
      - worker-net

  pgadmin:
    profiles: 
      - airflow
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  airflow-net:
    driver: bridge
  worker-net:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
