services:
  proxy:
    profiles:
      - airflow
    image: traefik:latest
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    networks:
      - airflow-net
    depends_on:
      airflow:
        condition: service_started
      pgadmin:
        condition: service_started
      mongo-express:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  airflow-net:
    external: true
