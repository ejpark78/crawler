services:
  airflow:
    profiles:
      - airflow
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    image: crawler/airflow:latest
    user: "root"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airflow.rule=PathPrefix(`/airflow`)"
      - "traefik.http.routers.airflow.entrypoints=web"
      - "traefik.http.services.airflow.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.airflow-strip.stripprefix.path=/airflow"
      - "traefik.http.routers.airflow.middlewares=airflow-strip"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=uH0_V9PzH5R1nZ3sD-mG_U2Xh7vBf8P1kS4mRjL6z3Q=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost/airflow
      - PYTHONPATH=/opt/airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - POSTGRES_HOST=postgres
    volumes:
      - ../dags:/opt/airflow/dags:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    # ports:
    #   - "8080:8080"
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    profiles: 
      - airflow
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    profiles:
      - airflow
    image: dpage/pgadmin4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=PathPrefix(`/pgadmin`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.http.middlewares.pgadmin-strip.stripprefix.path=/pgadmin"
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-strip"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    # ports:
    #   - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    profiles: 
      - airflow
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    profiles:
      - airflow
    image: mongo-express
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo.rule=PathPrefix(`/mongo`)"
      - "traefik.http.routers.mongo.entrypoints=web"
      - "traefik.http.services.mongo.loadbalancer.server.port=8081"
      - "traefik.http.middlewares.mongo-strip.stripprefix.path=/mongo"
      - "traefik.http.routers.mongo.middlewares=mongo-strip"
    # ports:
    #   - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mongodb

volumes:
  postgres_data:
