# Airflow 워크플로우 관리 모듈
# 크롤러 작업의 스케줄링 및 모니터링을 담당합니다.
#
# 포함된 서비스:
# - airflow: 스케줄러, 웹서버 및 워커 통합 실행 (접속 정보: http://af.localhost)
# - postgres: Airflow 메타데이터 저장용 DB
# - pgadmin: PostgreSQL 웹 관리 도구 (접속 정보: http://pg.localhost)

services:
  airflow:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    image: crawler/airflow:latest
    restart: unless-stopped
    user: "root"
    working_dir: /app
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__WEBSERVER__BASE_URL=${AIRFLOW__WEBSERVER__BASE_URL}
      - PYTHONPATH=${PYTHONPATH}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - GEEKNEWS_MAX_ACTIVE_RUNS=${GEEKNEWS_MAX_ACTIVE_RUNS-1}
      - GEEKNEWS_CONCURRENCY=${GEEKNEWS_CONCURRENCY-1}
    volumes:
      - ..:/app
      - ../dags:/opt/airflow/dags:ro
      - ${VOLUME_PATH}/airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airflow.rule=Host(`af.localhost`)"
      - "traefik.http.routers.airflow.entrypoints=web"
      - "traefik.http.services.airflow.loadbalancer.server.port=8080"
    networks:
      - airflow-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${VOLUME_PATH}/postgres:/var/lib/postgresql/data
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pg.localhost`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-stripprefix,pgadmin-scriptname"
      - "traefik.http.middlewares.pgadmin-stripprefix.stripprefix.prefixes="
      - "traefik.http.middlewares.pgadmin-scriptname.headers.customrequestheaders.X-Script-Name="
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    networks:
      - airflow-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  airflow-net:
    external: true
