services:
  airflow:
    profiles:
      - airflow
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    image: crawler/airflow:latest
    user: "root"
    networks:
      - airflow-net
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__WEBSERVER__BASE_URL=${AIRFLOW__WEBSERVER__BASE_URL}
      - PYTHONPATH=${PYTHONPATH}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airflow.rule=PathPrefix(`/af`)"
      - "traefik.http.routers.airflow.entrypoints=web"
      - "traefik.http.routers.airflow.middlewares=airflow-stripprefix"
      - "traefik.http.middlewares.airflow-stripprefix.stripprefix.prefixes=/af"
      - "traefik.http.services.airflow.loadbalancer.server.port=8080"
    volumes:
      - ../dags:/opt/airflow/dags:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: standalone
    # ports:
    #   - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/af/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    profiles:
      - airflow
    networks:
      - airflow-net
    image: postgres:13
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    profiles:
      - airflow
    networks:
      - airflow-net
    image: dpage/pgadmin4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=PathPrefix(`/pg`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-stripprefix"
      - "traefik.http.middlewares.pgadmin-stripprefix.stripprefix.prefixes=/pg"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    profiles:
      - airflow
    networks:
      - airflow-net
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    profiles:
      - airflow
    networks:
      - airflow-net
    image: mongo-express
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo-express.rule=PathPrefix(`/mg`)"
      - "traefik.http.routers.mongo-express.entrypoints=web"
      - "traefik.http.routers.mongo-express.middlewares=mongo-express-stripprefix"
      - "traefik.http.middlewares.mongo-express-stripprefix.stripprefix.prefixes=/mg"
      - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=${ME_CONFIG_MONGODB_SERVER}
      - ME_CONFIG_MONGODB_PORT=${ME_CONFIG_MONGODB_PORT}
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD}
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mongodb_data:

networks:
  airflow-net:
    external: true
