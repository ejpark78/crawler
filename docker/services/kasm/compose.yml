# Kasm 배스천 호스트 모듈
# 내부 작업 및 브라우저 기반 작업을 위한 VDI(Virtual Desktop Infrastructure) 환경을 제공합니다.
#
# 주요 기능:
# - Ubuntu 기반 GUI 환경
# - 한글 입력 지원 (Fcitx)
# - 주요 도구 내장: Chrome, MongoDB Compass, VS Code
# - 접속 정보: http://kasm.localhost (내부 6901 포트로 HTTPS 라우팅)

services:
  kasm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MODULE_FCITX=${MODULE_FCITX:-true}
        - MODULE_OHMYZSH=${MODULE_OHMYZSH:-true}
        - MODULE_DESKTOP_UTILS=${MODULE_DESKTOP_UTILS:-true}
        - MODULE_UV=${MODULE_UV:-true}
        - MODULE_NODEJS=${MODULE_NODEJS:-true}
        - MODULE_AI_AGENTS=${MODULE_AI_AGENTS:-true}
        - MODULE_VSCODE=${MODULE_VSCODE:-true}
        - MODULE_DBEAVER=${MODULE_DBEAVER:-true}
        - MODULE_BRAVE=${MODULE_BRAVE:-true}
        - MODULE_JOPLIN=${MODULE_JOPLIN:-true}
        - MODULE_DOCKER=${MODULE_DOCKER:-true}
        - MODULE_ANTIGRAVITY=${MODULE_ANTIGRAVITY:-true}
        - MODULE_CHROME=${MODULE_CHROME:-true}
        - MODULE_FIREFOX=${MODULE_FIREFOX:-true}
        - MODULE_MONGO_COMPASS=${MODULE_MONGO_COMPASS:-true}
        - MODULE_K8S_TOOLS=${MODULE_K8S_TOOLS:-true}
        - MODULE_SSHD=${MODULE_SSHD:-true}
    image: crawler/kasm:latest
    restart: unless-stopped
    shm_size: "1gb"
    privileged: false
    cap_add:
      - SYS_ADMIN
    environment:
      - KASM_USER=${KASM_USER}
      - VNC_PW=${VNC_PW}
      - VNCOPTIONS=-disableBasicAuth
      - LANG=${LANG}
      - LANGUAGE=${LANGUAGE}
      - LC_ALL=${LC_ALL}
      - XMODIFIERS=@im=fcitx
      - GTK_IM_MODULE=fcitx
      - QT_IM_MODULE=fcitx
      - SHELL=/usr/bin/zsh
    volumes:
      - ${VOLUME_PATH}/kasm:/mnt
      - ${VOLUME_PATH}/kasm/home:/home/kasm-user
      - /home/ejpark/workspace:/home/kasm-user/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - kube:/root/.kube:rw
      - ssh_keys:/root/.ssh:ro
    labels:
      - "traefik.enable=true"
      - "${TRAEFIK_ENABLE_LABEL}=true"
      - "traefik.http.routers.kasm.rule=Host(`kasm.localhost`)"
      - "traefik.http.routers.kasm.entrypoints=web"
      - "traefik.http.services.kasm.loadbalancer.server.port=6901"
      - "traefik.http.services.kasm.loadbalancer.server.scheme=https"
      - "traefik.http.services.kasm.loadbalancer.serversTransport=kasmTransport@file"
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost:6901/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  kube:
  ssh_keys:
