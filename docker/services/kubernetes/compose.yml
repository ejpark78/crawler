
services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - K8S_VERSION=v1.35.1
    image: local/kubernetes:v1.35.1
    privileged: true
    hostname: control-plane
    environment:
      - DOCKER_TLS_CERTDIR= # DinD 사용 시 인증서 충돌 방지
      - CNI_NAME=${CNI_NAME:-flannel}
    volumes:
      - kube:/root/.kube:rw
      - ssh_keys:/root/.ssh:rw
      - /lib/modules:/lib/modules:ro
      - ./startup:/startup:ro
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    healthcheck:
      # test: ["CMD", "kubectl", "cluster-info", "--kubeconfig=/etc/kubernetes/admin.conf"]
      test: ["CMD", "crictl", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - K8S_VERSION=v1.35.1
    image: local/kubernetes:v1.35.1
    privileged: true
    deploy:
      replicas: ${WORKERS:-1}
    environment:
      - DOCKER_TLS_CERTDIR=       
      - CNI_NAME=${CNI_NAME:-flannel}
    volumes:
      - kube:/root/.kube:rw
      - ssh_keys:/root/.ssh:rw
      - /lib/modules:/lib/modules:ro
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "crictl", "info"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  kube:
  ssh_keys:
