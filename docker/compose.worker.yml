# 크롤러 워커 모듈
# 실제 데이터 수집 작업을 수행하는 일회성(Ephemeral) 컨테이너를 정의합니다.
# Airflow의 BashOperator 등을 통해 동적으로 실행됩니다.

services:
  worker:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    image: crawler/worker:latest
    restart: no
    volumes:
      - ${VOLUME_PATH}/..:/app
    networks:
      - airflow-net

networks:
  airflow-net:
    external: true
