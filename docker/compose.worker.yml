services:
  worker:
    profiles: 
      - worker
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    image: crawler/worker:latest
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - POSTGRES_HOST=postgres
      - PYTHONUNBUFFERED=1
    working_dir: /app
    tty: true
    stdin_open: true

volumes:
  mongodb_data:
