# Traefik 리버스 프록시 모듈
# 외부 요청을 수신하여 호스트네임에 따라 적절한 서비스로 라우팅합니다.
#
# 접속 정보:
# - 대시보드: http://dash.localhost/dashboard/
# - 엔트리포인트: web (80번 포트)

services:
  traefik:
    build:
      context: ./traefik
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${TRAEFIK_PORT}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "${TRAEFIK_ENABLE_LABEL}=true"
      - "traefik.http.routers.traefik_dash.rule=Host(`dash.localhost`)"
      - "traefik.http.routers.traefik_dash.service=api@internal"
      - "traefik.http.routers.traefik_dash.entrypoints=web"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command:
      - "--ping=true"
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
      - "--providers.file.watch=true"
      - "--providers.file.filename=/etc/traefik/dynamic_conf.yml"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.constraints=Label(`${TRAEFIK_ENABLE_LABEL}`, `true`)"
