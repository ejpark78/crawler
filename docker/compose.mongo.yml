# MongoDB 데이터베이스 모듈
# 데이터 저장소 및 웹 기반 관리 인터페이스를 제공합니다.
#
# 포함된 서비스:
# - mongodb: 크롤링된 데이터를 저장하는 NoSQL DB
# - mongo-express: 웹 기반 DB 관리 도구 (접속 정보: http://me.localhost)

services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - ${VOLUME_PATH}/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    profiles:
      - mongo-ui
    image: mongo-express
    restart: unless-stopped
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD}
      - ME_CONFIG_SITE_BASEURL=
    labels:
      - "traefik.enable=true"
      - "${TRAEFIK_ENABLE_LABEL}=true"
      - "traefik.http.routers.mongo-express.rule=Host(`me.localhost`)"
      - "traefik.http.routers.mongo-express.entrypoints=web"
      - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 5s bash -c ' < /dev/tcp/127.0.0.1/8081'"]
      interval: 30s
      timeout: 10s
      retries: 3
