
services:
  control-plane:
    build:
      context: ../docker/kind
      dockerfile: Dockerfile
      args:
        - K8S_VERSION=v1.35.1
    image: local/kind:v1.35.1
    privileged: true
    networks:
      k8s-net:
        ipv4_address: 172.20.0.10
    environment:
      - DOCKER_TLS_CERTDIR= # DinD 사용 시 인증서 충돌 방지
    volumes:
      - /lib/modules:/lib/modules:ro
      # - /sys/fs/cgroup:/sys/fs/cgroup:rw
    healthcheck:
      # test: ["CMD", "kubectl", "cluster-info", "--kubeconfig=/etc/kubernetes/admin.conf"]
      test: ["CMD", "crictl", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ../docker/kind
      dockerfile: Dockerfile
      args:
        - K8S_VERSION=v1.35.1
    image: local/kind:v1.35.1
    privileged: true
    deploy:
      replicas: 2
    environment:
      - DOCKER_TLS_CERTDIR=       
    volumes:
      - /lib/modules:/lib/modules:ro
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "crictl", "info"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  k8s-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
